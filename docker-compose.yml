services:
  tesla-api:
    build: .
    container_name: tesla-tracker-api
    ports:
      - "8000:8000"
    volumes:
      - tesla-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/tesla_tracker.db
      - DEBUG=False
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tesla-network

  tesla-dashboard:
    build: .
    container_name: tesla-tracker-dashboard
    ports:
      - "8501:8501"
    volumes:
      - tesla-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/tesla_tracker.db
      - API_BASE_URL=http://tesla-api:8000
      - DEBUG=False
    command: streamlit run app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      tesla-api:
        condition: service_healthy
    networks:
      - tesla-network

volumes:
  tesla-data:

networks:
  tesla-network:
    driver: bridge
