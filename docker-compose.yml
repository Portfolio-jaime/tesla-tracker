services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - tesla-network

  api:
    build:
      context: .
      target: production
    container_name: tesla-tracker-api
    env_file: .env
    volumes:
      - tesla-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tesla-network

  dashboard:
    build:
      context: .
      target: production
    container_name: tesla-tracker-dashboard
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    command: streamlit run app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - tesla-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tesla-network

  api-dev:
    build:
      context: .
      target: dev
    profiles:
      - dev
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - tesla-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tesla-network
    command: uvicorn app.api.main:app --reload --host 0.0.0.0 --port 8000

  dashboard-dev:
    build:
      context: .
      target: dev
    profiles:
      - dev
    env_file: .env
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api-dev:8000
    volumes:
      - .:/app
      - tesla-data:/app/data
    networks:
      - tesla-network
    depends_on:
      api-dev:
        condition: service_healthy
    command: streamlit run app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  tesla-data:

networks:
  tesla-network:
    driver: bridge
