# Monta el código local sobre las imágenes existentes (sin rebuild)
# Eliminar este archivo cuando Docker Hub esté disponible y se pueda hacer build limpio
services:
  api:
    volumes:
      - .:/app
      - tesla-data:/app/data
    image: tesla-tracker-tesla-api:latest
    command: >
      sh -c "pip install -q -r /app/requirements.txt &&
             uvicorn app.api.main:app --reload --host 0.0.0.0 --port 8000"

  dashboard:
    volumes:
      - .:/app
      - tesla-data:/app/data
    image: tesla-tracker-tesla-dashboard:latest
    command: >
      sh -c "pip install -q -r /app/requirements.txt &&
             streamlit run app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0"
